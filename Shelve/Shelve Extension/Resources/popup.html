<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            width: 320px;
            padding: 16px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }
        .status-dot.online { background: #34c759; }
        .status-dot.offline { background: #ff3b30; }

        .page-info {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 12px;
        }
        .page-title {
            font-size: 13px;
            font-weight: 500;
            color: #ffffff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .page-url {
            font-size: 11px;
            color: #888;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .selection-preview {
            background: #2a2a2a;
            border-left: 3px solid #0a84ff;
            border-radius: 0 8px 8px 0;
            padding: 8px 12px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #aaa;
            font-style: italic;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .selection-preview.hidden { display: none; }

        .field {
            margin-bottom: 12px;
        }
        .field label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .field textarea,
        .field input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #2a2a2a;
            color: #e0e0e0;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
        }
        .field textarea:focus,
        .field input:focus {
            outline: none;
            border-color: #0a84ff;
        }
        .field textarea {
            min-height: 50px;
        }

        .save-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #0a84ff;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .save-btn:hover { background: #0070e0; }
        .save-btn:active { background: #005bb5; }
        .save-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .result {
            text-align: center;
            padding: 8px;
            margin-top: 8px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }
        .result.success { background: #1a3a1a; color: #34c759; }
        .result.error { background: #3a1a1a; color: #ff3b30; }
        .result.hidden { display: none; }

        .offline-msg {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 13px;
        }
        .offline-msg.hidden { display: none; }
        .settings-link {
            color: #888;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            text-decoration: none;
            padding: 4px;
        }
        .settings-link:hover { color: #e0e0e0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Shelve</h1>
        <div style="display:flex;align-items:center;gap:8px;">
            <div class="status-dot" id="statusDot"></div>
            <a class="settings-link" id="settingsLink" title="Settings">&#x2699;</a>
        </div>
    </div>

    <div class="offline-msg hidden" id="offlineMsg">
        API server is not running.<br>
        <a id="offlineSettingsLink" style="font-size: 11px; color: #0a84ff; cursor: pointer; text-decoration: underline;">Configure API endpoint</a>
    </div>

    <div id="mainContent">
        <div class="page-info">
            <div class="page-title" id="pageTitle">Loading...</div>
            <div class="page-url" id="pageUrl"></div>
        </div>

        <div class="selection-preview hidden" id="selectionPreview"></div>

        <div class="field">
            <label>Note (optional)</label>
            <textarea id="annotation" placeholder="Why is this interesting?"></textarea>
        </div>

        <div class="field">
            <label>Tags (comma-separated)</label>
            <input type="text" id="tags" placeholder="ai, architecture, strategy">
        </div>

        <button class="save-btn" id="saveBtn">Shelve</button>
        <div class="result hidden" id="result"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
